<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Robot ODA Dashboard</title>
    <style>
        .task {
            padding: 10px;
            border: 1px solid #ccc;
            margin: 5px;
            cursor: move;
        }
        .dragging {
            opacity: 0.5;
        }
        .over {
            border: 2px dashed #000;
        }
    </style>
</head>
<body>
    <div id="task-container">
        <div class="task" draggable="true">Task 1</div>
        <div class="task" draggable="true">Task 2</div>
        <div class="task" draggable="true">Task 3</div>
    </div>
    <script>
        const tasks = document.querySelectorAll('.task');
        const taskContainer = document.getElementById('task-container');

        tasks.forEach(task => {
            task.addEventListener('dragstart', dragStart);
            task.addEventListener('dragend', dragEnd);
        });

        taskContainer.addEventListener('dragover', dragOver);
        taskContainer.addEventListener('dragenter', dragEnter);
        taskContainer.addEventListener('dragleave', dragLeave);
        taskContainer.addEventListener('drop', drop);

        let dragSrcEl = null;

        function dragStart(e) {
            dragSrcEl = this;
            this.classList.add('dragging');
            e.dataTransfer.effectAllowed = 'move';
            e.dataTransfer.setData('text/html', this.innerHTML);
        }

        function dragEnd(e) {
            this.classList.remove('dragging');
        }

        function dragOver(e) {
            e.preventDefault();
            e.dataTransfer.dropEffect = 'move';
            return false;
        }

        function dragEnter(e) {
            this.classList.add('over');
        }

        function dragLeave(e) {
            this.classList.remove('over');
        }

        function drop(e) {
            e.stopPropagation();  
            if (dragSrcEl !== this) {
                dragSrcEl.innerHTML = this.innerHTML;
                this.innerHTML = e.dataTransfer.getData('text/html');
            }
            return false;
        }
    </script>
</body>
</html>
